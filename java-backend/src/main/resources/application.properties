# ─── Server ─────────────────────────────────────────────────────────────────
server.port=8080

# ─── Application ─────────────────────────────────────────────────────────────
spring.application.name=log-anomaly-detector

# ─── Database (H2 in-memory — swap for MySQL in production) ──────────────────
spring.datasource.url=jdbc:h2:mem:logdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── MySQL (uncomment to use MySQL instead of H2) ────────────────────────────
# spring.datasource.url=jdbc:mysql://localhost:3306/loganalyzer?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ─── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Python ML Service ───────────────────────────────────────────────────────
ml.service.url=http://localhost:5000

# ─── Alert / Email ───────────────────────────────────────────────────────────
alert.email.enabled=false
alert.email.to=admin@example.com
alert.email.from=noreply@loganalyzer.com

# SMTP (fill in for real email alerts)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.loganalyzer=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p %pid --- [%t] %-40.40logger{39} : %m%n
logging.file.name=logs/app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
